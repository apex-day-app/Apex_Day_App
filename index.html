<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fund Money</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL STYLE
========================= */

body{
font-family:Poppins;
margin:0;
background:#f5f5f5;
display:flex;
justify-content:center;
}

.page{
max-width:420px;
width:100%;
background:white;
min-height:100vh;
}

.hidden{
display:none;
}

/* =========================
LOGIN PAGE
========================= */

.auth-container{
padding:25px;
display:flex;
flex-direction:column;
gap:10px;
}

.auth-input{
padding:12px;
border-radius:6px;
border:1px solid #ccc;
}

.auth-btn{
padding:12px;
background:#D4AF37;
border:none;
font-weight:600;
cursor:pointer;
border-radius:6px;
}

.auth-header{
text-align:center;
color:#D4AF37;
}

/* =========================
TOP BAR
========================= */

.top-bar{
display:flex;
justify-content:space-between;
padding:10px;
background:white;
border-bottom:2px solid #D4AF37;
}

.balance{
font-size:20px;
font-weight:700;
color:#D4AF37;
}

/* =========================
GAME AREA
========================= */

.game-area{
padding:15px;
background:#1a1a1a;
color:white;
}

.timer{
font-size:40px;
text-align:center;
color:#FFD700;
}

.result{
height:50px;
display:flex;
align-items:center;
justify-content:center;
background:#333;
border-radius:8px;
margin-top:10px;
}

/* =========================
BET BUTTON
========================= */

.bet-buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.green{
flex:1;
background:#00C853;
padding:15px;
color:white;
font-weight:700;
border:none;
border-radius:8px;
}

.blue{
flex:1;
background:#2962FF;
padding:15px;
color:white;
font-weight:700;
border:none;
border-radius:8px;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div id="login-page" class="page">

<div class="auth-container">

<h2 class="auth-header">Fund Money</h2>

<input id="login-email" class="auth-input" placeholder="Email">

<input id="login-password" class="auth-input" type="password" placeholder="Password">

<button class="auth-btn" onclick="login()">Login</button>

<button class="auth-btn" onclick="signup()">Sign Up</button>

</div>

</div>


<!-- DASHBOARD -->

<div id="dashboard" class="page hidden">

<div class="top-bar">

<div class="balance">
₹ <span id="balance">0</span>
</div>

<button onclick="logout()">Logout</button>

</div>


<div class="game-area">

<div class="timer" id="timer">
15
</div>

<div class="result" id="result"></div>

<div class="bet-buttons">

<button class="green" onclick="bet('green')">
Green 2x
</button>

<button class="blue" onclick="bet('blue')">
Blue 2x
</button>

</div>

</div>

</div>



<script>

/* =========================
FIREBASE
========================= */

const firebaseConfig = {

apiKey: "AIzaSyB2dTlbmwvlGu-DJXsd3sAIHJMQo8cEnXg",
authDomain: "apex-day-game.firebaseapp.com",
projectId: "apex-day-game"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();


let balance = 0;


/* =========================
AUTH
========================= */

function signup(){

let email=document.getElementById("login-email").value
let pass=document.getElementById("login-password").value

auth.createUserWithEmailAndPassword(email,pass)

.then(()=>{

db.collection("users").doc(auth.currentUser.uid).set({

balance:20

})

})

}


function login(){

let email=document.getElementById("login-email").value
let pass=document.getElementById("login-password").value

auth.signInWithEmailAndPassword(email,pass)

}


function logout(){

auth.signOut()

}


/* =========================
USER LOAD
========================= */

auth.onAuthStateChanged(user=>{

if(user){

document.getElementById("login-page").classList.add("hidden")
document.getElementById("dashboard").classList.remove("hidden")

db.collection("users").doc(user.uid).onSnapshot(doc=>{

balance=doc.data().balance
document.getElementById("balance").innerText=balance

})

startGame()

}

})


/* =========================
GAME
========================= */

let time=15
let timerInterval

function startGame(){

time=15

timerInterval=setInterval(()=>{

time--

document.getElementById("timer").innerText=time

if(time==0){

clearInterval(timerInterval)

let result=Math.random()>0.5?"green":"blue"

document.getElementById("result").innerText=result

setTimeout(startGame,3000)

}

},1000)

}


function bet(color){

if(balance<10) return

balance-=10

document.getElementById("balance").innerText=balance

db.collection("users").doc(auth.currentUser.uid).update({

balance:balance

})

}

</script>

</body>
</html>
